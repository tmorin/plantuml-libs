name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

# Permissions for Copilot skills that perform package upgrades.
# Copilot uses these to: create branches, commit changes, trigger workflows, and create PRs.
# See: doc/howto.upgrade-simpleicons-package.md for workflow operations.
# NOTE: GITHUB_TOKEN cannot trigger workflow_dispatch on the same repo (GitHub platform
# limitation). To allow the Copilot agent to trigger the package-builder workflow, create a
# Personal Access Token (classic) with the `repo` scope, store it as the repository secret
# GH_WORKFLOW_TOKEN, and the setup step below will expose it as GH_TOKEN for the gh CLI.
permissions:
  contents: write        # Create branches and push commits
  actions: write         # Read workflow metadata (insufficient alone to dispatch workflows)
  pull-requests: write   # Create pull requests

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-22.04

    steps:
      - name: Configure workflow token for gh CLI
        # Expose GH_WORKFLOW_TOKEN as GH_TOKEN so the Copilot agent can trigger
        # workflow_dispatch via 'gh api'. GITHUB_TOKEN alone cannot trigger new workflow
        # runs on the same repo; a PAT with 'repo' scope is required.
        # Create the secret at: Settings → Secrets and variables → Actions → GH_WORKFLOW_TOKEN
        if: ${{ secrets.GH_WORKFLOW_TOKEN != '' }}
        run: echo "GH_TOKEN=${{ secrets.GH_WORKFLOW_TOKEN }}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz zip podman

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node22-
            ${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci --no-progress

      - name: Verify installation
        run: |
          echo "Verifying Node.js toolchain..."
          echo "✓ Node.js: $(node --version)"
          echo "✓ npm: $(npm --version)"
          echo "✓ TypeScript: $(npx tsc --version)"
          echo "✓ ESLint: $(npx eslint --version)"
          echo "✓ Mocha: $(npx mocha --version)"
          echo "✓ ts-node: $(npx ts-node --version)"
          echo "✓ GraphViz: $(dot -V 2>&1)"
